name: Flight Tracker ETL

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: flight-tracking-bigdata
      BQ_DATASET_ID: flight_data
      BQ_TABLE_NAME: gold_flight_states
      GCS_BUCKET: flight-tracking-big-data
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_creds.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install prefect google-cloud-storage google-cloud-bigquery pyspark requests numpy pandas

      - name: Set up GCP credentials
        run: |
          cat <<EOF > /tmp/gcp_creds.json
          ${{ secrets.GCP_CREDS_JSON }}
          EOF
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_creds.json

      - name: Download GCS connector
        run: |
          mkdir -p jars
          wget -O jars/gcs-connector-hadoop3-2.2.11-shaded.jar \
            https://storage.googleapis.com/hadoop-lib/gcs/gcs-connector-latest-hadoop3.jar

      - name: Run Prefect Orchestrator Flow
        run: |
          python etl/flow.py